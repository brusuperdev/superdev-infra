apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: bruviti-ai-superdev-eks
  region: us-east-1
  version: "1.31"

vpc:
  id: vpc-0a05f0eb7f3518554
  subnets:
    public:
      us-east-1a:
        id: subnet-04e578655174608e0
      us-east-1b:
        id: subnet-0fa1ad0795e421352
    private:
      us-east-1a:
        id: subnet-0170ff2c675f7d3d2
      us-east-1b:
        id: subnet-0b2cb16c0f29bc30e

managedNodeGroups:
  - name: superdev-ng-1
    instanceType: t3.medium
    desiredCapacity: 1
    minSize: 1
    maxSize: 3
    volumeSize: 30
    ssh:
      allow: false
    iam:
      withAddonPolicies:
        ebs: true
        efs: false
        albIngress: true
        cloudWatch: true

iam:
  withOIDC: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - controllerManager
